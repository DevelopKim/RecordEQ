<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Shared bottom-to-top gradient: green → yellow → red -->
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#00FF66"/>
      <stop offset="62%"  stop-color="#00FF66"/>
      <stop offset="78%"  stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FF3333"/>
    </linearGradient>

    <!-- Neon glow -->
    <filter id="glow" x="-40%" y="-10%" width="180%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer vignette via radial gradient -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#050505"/>

  <!-- Baseline -->
  <rect x="112" y="876" width="800" height="4" fill="#111"/>

  <!-- 5 EQ bars: mountain peak shape, bar w=130px gap=70px -->
  <!-- x positions: 112, 312, 512, 712, 782  ... recalc:
       total = 5*130 + 4*70 = 930 → center: (1024-930)/2 = 47
       x: 47, 247, 447, 647, 847 -->

  <!-- Bar 1  h=280 -->
  <rect x="47"  y="596" width="130" height="280" fill="url(#barGrad)" filter="url(#glow)"/>
  <!-- Bar 2  h=440 -->
  <rect x="247" y="436" width="130" height="440" fill="url(#barGrad)" filter="url(#glow)"/>
  <!-- Bar 3  h=590 (tallest) -->
  <rect x="447" y="286" width="130" height="590" fill="url(#barGrad)" filter="url(#glow)"/>
  <!-- Bar 4  h=390 -->
  <rect x="647" y="486" width="130" height="390" fill="url(#barGrad)" filter="url(#glow)"/>
  <!-- Bar 5  h=220 -->
  <rect x="847" y="656" width="130" height="220" fill="url(#barGrad)" filter="url(#glow)"/>

  <!-- Segment dividers (horizontal black lines to simulate LED segments) -->
  <!-- Applied over bars: 28 segments → segment height = 590/28 ≈ 21px; gap ≈ 3px -->
